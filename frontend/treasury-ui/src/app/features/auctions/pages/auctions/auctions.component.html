<h2>Treasury Auctions Dashboard</h2>

<!-- KPI CARDS -->
<div class="kpi-container">

  <div class="kpi-card yield">
    <h3>Yield</h3>
    <p>{{ kpi.yield }}%</p>
  </div>

  <div class="kpi-card volume">
    <h3>Volume</h3>
    <p>{{ kpi.volume }}</p>
  </div>

  <div class="kpi-card spread">
    <h3>Spread</h3>
    <p>{{ kpi.spread }}%</p>
  </div>

</div>

<!-- FILTER -->
<mat-form-field appearance="outline" style="width: 300px;">
  <input matInput (keyup)="applyFilter($event)" placeholder="Search auctions">
</mat-form-field>

<!-- TABLE -->
<table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let a">{{ a.id }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let a">{{ a.name }}</td>
  </ng-container>

  <ng-container matColumnDef="rate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Rate</th>
    <td mat-cell *matCellDef="let a">{{ a.rate }}%</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<mat-paginator
  [pageSize]="5"
  [pageSizeOptions]="[5, 10, 20]">
</mat-paginator>
